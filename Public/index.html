<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mailer</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 2; }
        input, textarea { display: block; width: 100%; margin-bottom: 10px; padding: 8px; }
        textarea { height: 100px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <label>Your Gmail ID:</label>
    <input id="email" type="email" placeholder="abc@gmail.com">

    <label>App Password:</label>
    <input id="pass" type="password" placeholder="16-digit App Password">

    <label>Subject:</label>
    <input id="sub" type="text" placeholder="Subject here">

    <label>Message:</label>
    <textarea id="msg" placeholder="Write your message here..."></textarea>

    <label>Recipients (Comma separated):</label>
    <textarea id="recipients" placeholder="email1@test.com, email2@test.com"></textarea>

    <button onclick="send()">Send Emails</button>

    <script>
        async function send() {
            const list = document.getElementById('recipients').value.split(',');
            const btn = document.querySelector('button');
            btn.disabled = true;
            btn.innerText = "Sending...";

            for(let to of list) {
                if(!to.trim()) continue;
                
                await fetch('/api/send-email', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        gmailId: document.getElementById('email').value,
                        appPassword: document.getElementById('pass').value,
                        subject: document.getElementById('sub').value,
                        messageBody: document.getElementById('msg').value,
                        to: to.trim()
                    })
                });
                console.log('Sent to:', to);
                await new Promise(r => setTimeout(r, 6000));
            }
            btn.disabled = false;
            btn.innerText = "Send Emails";
            alert('Finished!');
        }
    </script>
</body>
</html>
