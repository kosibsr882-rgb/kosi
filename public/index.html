<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fast Mailer — Login</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 320px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h3>Fast Mailer Access</h3>
    <input id="email" type="email" placeholder="Gmail ID">
    <input id="pass" type="password" placeholder="App Password">
    <input id="sub" type="text" placeholder="Subject">
    <textarea id="msg" style="width:100%; height:80px;" placeholder="Message"></textarea>
    <textarea id="recipients" style="width:100%; height:80px;" placeholder="Emails (comma separated)"></textarea>
    <button onclick="send()">Send Emails</button>
</div>

<script>
    async function send() {
        const emails = document.getElementById('recipients').value.split(',').map(e => e.trim());
        const btn = document.querySelector('button');
        btn.disabled = true;
        btn.innerText = "Sending...";

        for(let to of emails) {
            if(!to) continue;
            await fetch('/api/send-email', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    gmailId: document.getElementById('email').value,
                    appPassword: document.getElementById('pass').value,
                    subject: document.getElementById('sub').value,
                    messageBody: document.getElementById('msg').value,
                    to: to
                })
            });
            await new Promise(r => setTimeout(r, 6000));
        }
        btn.disabled = false;
        btn.innerText = "Send Emails";
        alert('Process Complete!');
    }
</script>
</body>
</html>
