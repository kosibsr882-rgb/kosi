<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Mailer Launcher</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 400px;
        }
        h2 { text-align: center; color: #38bdf8; margin-top: 0; }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }
        textarea { resize: vertical; height: 80px; }
        button {
            width: 100%;
            padding: 10px;
            background: #22c55e;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #16a34a; }
        .logout-btn {
            background: #ef4444;
            margin-top: 15px;
        }
        .logout-btn:hover { background: #dc2626; }
        #status { text-align: center; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Fast Mailer</h2>
        <form id="mailForm">
            <input type="text" id="senderName" placeholder="Sender Name (Optional)">
            <input type="email" id="gmailId" placeholder="Your Gmail ID" required>
            <input type="password" id="appPassword" placeholder="Gmail App Password" required>
            <input type="email" id="to" placeholder="Recipient Email (To)" required>
            <input type="text" id="subject" placeholder="Email Subject" required>
            <textarea id="messageBody" placeholder="Message Body..." required></textarea>
            <button type="submit">Send Email</button>
        </form>
        <button class="logout-btn" id="logoutBtn">Logout</button>
        <div id="status"></div>
    </div>

    <script>
        document.getElementById('mailForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            status.textContent = 'Sending...';
            status.style.color = '#38bdf8';

            const payload = {
                senderName: document.getElementById('senderName').value,
                gmailId: document.getElementById('gmailId').value,
                appPassword: document.getElementById('appPassword').value,
                to: document.getElementById('to').value,
                subject: document.getElementById('subject').value,
                messageBody: document.getElementById('messageBody').value
            };

            try {
                const res = await fetch('/api/send-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    status.textContent = 'Email sent successfully! 🚀';
                    status.style.color = '#22c55e';
                } else {
                    status.textContent = 'Error: ' + data.message;
                    status.style.color = '#f87171';
                }
            } catch (err) {
                status.textContent = 'Network error!';
                status.style.color = '#f87171';
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/logout', { method: 'POST' });
            window.location.href = '/';
        });
    </script>
</body>
</html>
