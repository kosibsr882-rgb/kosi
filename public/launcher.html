<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast Mailer — Launcher</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#0f172a;font-family:'Inter',sans-serif;color:#f8fafc;padding:24px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;background:#1e293b;padding:14px 22px;border-radius:14px;border:1px solid #334155}
.logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700;color:#ffffff}
.logo span{color:#38bdf8}
.logout-btn{padding:8px 18px;background:#334155;border:1px solid #475569;border-radius:8px;color:#f1f5f9;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s}
.logout-btn:hover{background:#ef4444;border-color:#ef4444;color:#fff}
.status-bar{display:flex;align-items:center;gap:12px;padding:13px 20px;background:#1e293b;border:1px solid #334155;border-radius:12px;margin-bottom:22px;transition:all 0.3s}
.status-bar.success{border-color:#22c55e;background:#064e3b}
.status-bar.error{border-color:#ef4444;background:#7f1d1d}
.status-bar.sending{border-color:#38bdf8;background:#164e63}
.status-icon{font-size:20px}
.status-text{font-size:14px;font-weight:600;color:#f8fafc}
.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:24px}
.card-title{font-size:12px;font-weight:700;color:#38bdf8;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:18px}
.field{margin-bottom:15px}
.field label{display:block;font-size:13px;font-weight:600;color:#cbd5e1;margin-bottom:7px}
.field input,.field textarea{width:100%;padding:12px 15px;background:#0f172a;border:1px solid #475569;border-radius:10px;color:#f8fafc;font-family:'Inter',sans-serif;font-size:14px;outline:none;resize:none}
.field input:focus,.field textarea:focus{border-color:#38bdf8;box-shadow:0 0 0 3px rgba(56,189,248,0.2)}
textarea#messageBody{min-height:115px}
textarea#recipients{min-height:145px;font-size:13px}
.pass-wrap{position:relative}
.pass-wrap input{padding-right:46px}
.toggle-pass{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;color:#94a3b8;cursor:pointer;font-size:17px;padding:4px}
.rec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.badge{font-size:11px;font-weight:700;padding:3px 12px;background:#38bdf8;color:#0f172a;border-radius:20px}
.tips{padding:14px;background:#0f172a;border:1px solid #334155;border-radius:10px;font-size:12px;color:#94a3b8;line-height:1.8;margin-top:14px}
.tips strong{color:#cbd5e1;display:block;margin-bottom:5px;font-size:11px;text-transform:uppercase}
.progress-wrap{display:none;align-items:center;gap:14px;padding:14px 20px;background:#1e293b;border:1px solid #334155;border-radius:12px;margin-bottom:20px}
.progress-bar{flex:1;height:8px;background:#0f172a;border-radius:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#38bdf8,#2563eb);border-radius:10px;width:0%;transition:width 0.3s ease}
.progress-text{font-size:13px;font-weight:600;color:#38bdf8;white-space:nowrap}
.action-row{display:flex;gap:12px;margin-bottom:20px}
.send-btn{flex:1;padding:15px;background:linear-gradient(135deg,#38bdf8,#2563eb);border:none;border-radius:12px;color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.send-btn:disabled{opacity:0.6;cursor:not-allowed}
.clear-btn{padding:15px 22px;background:#1e293b;border:1px solid #475569;border-radius:12px;color:#cbd5e1;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.log-box{display:none;background:#1e293b;border:1px solid #334155;border-radius:14px;overflow:hidden}
.log-header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid #334155;background:#0f172a}
.log-title{font-size:12px;font-weight:700;color:#38bdf8;text-transform:uppercase}
.log-clear{background:none;border:none;color:#94a3b8;font-size:13px;cursor:pointer;font-weight:600}
.log-list{padding:12px;max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.log-item{display:flex;align-items:flex-start;gap:10px;padding:9px 13px;border-radius:8px;font-size:13px;font-weight:500}
.log-item.ok{background:#064e3b;color:#a7f3d0}
.log-item.fail{background:#7f1d1d;color:#fecaca}
.log-item.info{background:#164e63;color:#bae6fd}
@media(max-width:700px){.main-grid{grid-template-columns:1fr}body{padding:14px}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">📧 Fast<span>Mailer</span></div>
  <button class="logout-btn" id="logoutBtn">⎋ Logout</button>
</div>

<div class="status-bar" id="statusBar">
  <span class="status-icon" id="statusIcon">⚡</span>
  <span class="status-text" id="statusText">Ready to launch</span>
</div>

<div class="main-grid">
  <div class="card">
    <div class="card-title">⚙️ Sender Config & Anti-Spam</div>
    <div class="field"><label>Sender Name</label><input id="senderName" type="text" placeholder="e.g. Rahul Sharma"></div>
    <div class="field"><label>Gmail ID</label><input id="gmailId" type="email" placeholder="you@gmail.com"></div>
    <div class="field">
      <label>App Password</label>
      <div class="pass-wrap">
        <input id="appPassword" type="password" placeholder="Google App Password">
        <button class="toggle-pass" onclick="togglePass()">👁</button>
      </div>
    </div>
    <div class="field"><label>Subject</label><input id="subject" type="text" placeholder="Email subject line"></div>
    <div class="field"><label>Message Body</label><textarea id="messageBody" placeholder="Write your email content here..."></textarea></div>
  </div>

  <div class="card">
    <div class="card-title">👥 Recipients</div>
    <div class="field">
      <div class="rec-header">
        <label>Email List</label>
        <span class="badge" id="recipientCount">0 recipients</span>
      </div>
      <textarea id="recipients" placeholder="Paste emails here:&#10;&#10;alice@gmail.com&#10;bob@yahoo.com" oninput="countRecipients()"></textarea>
    </div>
    <div class="tips">
      <strong>🛡️ Anti-Spam Shield Active</strong>
      Har email mein invisible random variations aur safe gaps jode jaate hain taaki Google ka filter text ko match na kar paye aur mail <b>Primary Inbox</b> mein jaye.
    </div>
  </div>
</div>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <span class="progress-text" id="progressText">0 / 0</span>
</div>

<div class="action-row">
  <button class="send-btn" id="sendBtn" onclick="sendAll()">🚀 Send All Emails Securely</button>
  <button class="clear-btn" onclick="clearAll()">🗑 Clear All</button>
</div>

<div class="log-box" id="logBox">
  <div class="log-header">
    <span class="log-title">📋 Send Log</span>
    <button class="log-clear" onclick="clearLog()">✕ Clear</button>
  </div>
  <div class="log-list" id="logList"></div>
</div>

<script>
function parseEmails(raw){return raw.split(/[\n,]+/).map(e=>e.trim().toLowerCase()).filter(e=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e))}
function countRecipients(){const e=parseEmails(document.getElementById('recipients').value),b=document.getElementById('recipientCount');b.textContent=`${e.length} recipient${e.length!==1?'s':''}`;b.style.background=e.length>50?'#ef4444':'#38bdf8';b.style.color=e.length>50?'#fff':'#0f172a'}
function togglePass(){const i=document.getElementById('appPassword');i.type=i.type==='password'?'text':'password'}
function setStatus(t,icon,text){const b=document.getElementById('statusBar');b.className='status-bar '+t;document.getElementById('statusIcon').textContent=icon;document.getElementById('statusText').textContent=text}
function addLog(t,icon,msg){const lb=document.getElementById('logBox'),ll=document.getElementById('logList');lb.style.display='block';const i=document.createElement('div');i.className=`log-item ${t}`;i.innerHTML=`<span>${icon}</span><span>${msg}</span>`;ll.appendChild(i);lb.scrollTop=lb.scrollHeight}
function clearLog(){document.getElementById('logList').innerHTML='';document.getElementById('logBox').style.display='none'}
function setProgress(cur,tot){const w=document.getElementById('progressWrap');w.style.display='flex';const pct=tot>0?Math.round(cur/tot*100):0;document.getElementById('progressFill').style.width=pct+'%';document.getElementById('progressText').textContent=`Sending ${cur} / ${tot}`}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

// Anti-Spam function: Har email ke text me invisible unique character ya zero-width space add karta hai taaki Google signature match na kar sake
function applyAntiSpamShield(text) {
    const invisibleChars = ['\u200B', '\u200C', '\u200D', '\uFEFF'];
    let modified = '';
    for (let i = 0; i < text.length; i++) {
        modified += text[i];
        // Randomly 5% chance par invisible character inject karein
        if (Math.random() < 0.05) {
            modified += invisibleChars[Math.floor(Math.random() * invisibleChars.length)];
        }
    }
    return modified;
}

function validate(){
  const fields=[{id:'senderName',label:'Sender Name'},{id:'gmailId',label:'Gmail ID'},{id:'appPassword',label:'App Password'},{id:'subject',label:'Subject'},{id:'messageBody',label:'Message Body'}];
  for(const f of fields){if(!document.getElementById(f.id).value.trim()){setStatus('error','❌',`${f.label} is required`);document.getElementById(f.id).focus();return false}}
  const emails=parseEmails(document.getElementById('recipients').value);
  if(emails.length===0){setStatus('error','❌','Add at least 1 valid recipient email');return false}
  if(emails.length>50){setStatus('error','❌','Max 50 recipients per batch');return false}
  return emails
}

async function sendAll(){
  const emails=validate();if(!emails)return;
  const senderName=document.getElementById('senderName').value.trim();
  const gmailId=document.getElementById('gmailId').value.trim();
  const appPassword=document.getElementById('appPassword').value.trim();
  const subject=document.getElementById('subject').value.trim();
  const rawMessageBody=document.getElementById('messageBody').value.trim();
  const btn=document.getElementById('sendBtn');
  
  btn.disabled=true;btn.innerHTML='⏳ Sending Securely...';
  clearLog();setStatus('sending','📤',`Sending to ${emails.length} recipients with Anti-Spam Shield...`);setProgress(0,emails.length);
  
  let ok=0,fail=0;

  for(let i=0; i<emails.length; i++){
    const email = emails[i];
    
    // Har email ke liye unique message body generate karna taaki Google filter catch na kar paaye
    const uniqueMessageBody = applyAntiSpamShield(rawMessageBody);

    try{
      const res=await fetch('/api/send-email',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({senderName,gmailId,appPassword,subject,messageBody: uniqueMessageBody,to:email})
      });
      const d=await res.json();
      if(res.ok&&d.success){ok++;addLog('ok','✅',`Delivered to Primary → ${email}`)}
      else{fail++;addLog('fail','❌',`Failed → ${email} (${d.message || 'Error'})`)}
    }catch(err){
      fail++;addLog('fail','❌',`Error → ${email}`);
    }

    setProgress(i + 1, emails.length);

    // Natural human delay (4 se 6 seconds random gap) taaki spam trigger na ho
    if(i < emails.length - 1) {
      const randomDelay = Math.floor(Math.random() * 2000) + 4000; // 4 to 6 seconds
      await sleep(randomDelay);
    }
  }

  if(fail===0){setStatus('success','🎉',`All ${ok} emails sent successfully to Primary inbox!`);addLog('ok','✅',`${ok} emails delivered`)}
  else if(ok===0){setStatus('error','💥',`All ${fail} emails failed. Check credentials.`);addLog('fail','❌',`All failed — check Gmail & App Password`)}
  else{setStatus('sending','⚠️',`${ok} sent, ${fail} failed`);addLog('ok','✅',`${ok} delivered`);addLog('fail','❌',`${fail} failed`)}
  addLog('info','📊',`Total: ${emails.length}  ·  ✅ ${ok} success  ·  ❌ ${fail} failed`);
  btn.disabled=false;btn.innerHTML='🚀 Send All Emails Securely';
}

function clearAll(){
  ['senderName','gmailId','appPassword','subject','messageBody','recipients'].forEach(id=>document.getElementById(id).value='');
  countRecipients();clearLog();document.getElementById('progressWrap').style.display='none';setStatus('','⚡','Ready to launch');
}

document.getElementById('logoutBtn').addEventListener('click',async()=>{
  if(!confirm('Logout karna chahte hain?'))return;
  await fetch('/logout',{method:'POST'});window.location.href='/';
});
</script>
</body>
</html>
