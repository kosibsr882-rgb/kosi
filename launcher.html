<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<style>#editor{height:150px;background:#fff;}</style>
</head>
<body>
<div id="editor"></div>
<textarea id="emails" placeholder="Emails separated by comma"></textarea>
<button id="btn" onclick="sendAll()">🚀 Send Emails</button>

<script>
    var quill = new Quill('#editor', {theme: 'snow'});
    async function sendAll(){
        const emails = document.getElementById('emails').value.split(',');
        document.getElementById('btn').disabled = true;
        for(const email of emails){
            await fetch('/api/send-email', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    senderName: 'User', gmailId: 'YOUR_EMAIL', appPassword: 'YOUR_APP_PASS',
                    subject: 'Hello', messageBody: quill.root.innerHTML, to: email.trim()
                })
            });
            // 5 to 10 seconds random delay to prevent spam
            await new Promise(r => setTimeout(r, Math.random() * (10000 - 5000) + 5000));
        }
        alert('Done!');
    }
</script>
</body>
</html>
