<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast Mailer — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Inter', sans-serif; background: #eef0ff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .login-card { background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(102,126,234,0.15); width: 100%; max-width: 360px; text-align: center; }
    .logo { font-size: 24px; font-weight: 700; color: #1a1a2e; margin-bottom: 25px; }
    .logo span { color: #667eea; }
    .field { margin-bottom: 15px; text-align: left; }
    .field label { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; display: block; }
    .field input { width: 100%; padding: 12px; border: 2px solid #dde1ff; border-radius: 10px; box-sizing: border-box; outline: none; }
    .field input:focus { border-color: #667eea; }
    .login-btn { width: 100%; padding: 12px; background: #667eea; border: none; border-radius: 10px; color: #fff; font-weight: 600; cursor: pointer; margin-top: 10px; }
    .error { color: #e53e3e; font-size: 12px; margin-top: 10px; display: none; }
</style>
</head>
<body>

<div class="login-card">
    <div class="logo">📧 Fast<span>Mailer</span></div>
    <div class="field"><label>Username</label><input type="text" id="username"></div>
    <div class="field"><label>Password</label><input type="password" id="password"></div>
    <button class="login-btn" onclick="login()">Sign In</button>
    <div id="errorMsg" class="error">Invalid username or password</div>
</div>

<script>
    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
            window.location.href = '/launcher';
        } else {
            document.getElementById('errorMsg').style.display = 'block';
        }
    }
</script>
</body>
</html>
