<!DOCTYPE html>
<html>
<head><title>Login</title>
<style>body{background:#eef0ff;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;}
.card{background:#fff;padding:30px;border-radius:15px;width:300px;text-align:center;}
input{width:100%;margin:10px 0;padding:10px;border:1px solid #ccc;border-radius:5px;}
button{width:100%;padding:10px;background:#667eea;color:#fff;border:none;border-radius:5px;cursor:pointer;}</style>
</head>
<body>
<div class="card">
    <h3>Fast Mailer Login</h3>
    <input id="u" placeholder="Username"><input id="p" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>
<script>async function login(){
    const res = await fetch('/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:document.getElementById('u').value, password:document.getElementById('p').value})});
    if((await res.json()).success) window.location.href='/launcher';
}</script>
</body>
</html>
